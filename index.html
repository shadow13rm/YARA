<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            color: #fff;
        }

        /* زر البداية */
        #btn-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.5s ease;
            user-select: none;
        }

        .heart-btn {
            font-size: 35px;
            animation: pulse 1.2s infinite;
            margin-right: 15px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .btn-text {
            font-size: 16px;
            color: #ffb3c6;
            line-height: 1.5;
            letter-spacing: 0.5px;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* نصوص المعايدة */
        #text-container {
            position: absolute;
            top: 20%;
            left: 10%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 18px;
            pointer-events: none;
        }

        .line {
            font-size: 17px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1s ease, transform 1s ease;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }

        .line.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* توافق مع شاشات الهواتف */
        @media (max-width: 768px) {
            #text-container {
                left: 5%;
                top: 15%;
                gap: 12px;
            }
            .line { font-size: 14px; }
            .heart-btn { font-size: 30px; }
            .btn-text { font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="btn-container" onclick="startAnimation()">
    <div class="heart-btn">🩷</div>
    <div class="btn-text">Click Me :)<br>Birthday Queen !</div>
</div>

<div id="text-container"></div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let branches = [];
    let leaves = [];
    let treeGrown = false;
    let textStarted = false;

    const leafColors = ['#ff4d4d', '#ff9999', '#ffcc00', '#ff66b2', '#ffccff', '#ff9933'];
    const textLines = [
        "Hey you 💘",
        "Happy Birthday 🎀",
        "May God bless you 🎈",
        "And give u many happiness 🌟",
        "Just saying ... you're pretty awesome 🫶🏻",
        "Sending good vibes and maybe a wink 😉",
        "Hope u have a great day today ❤️"
    ];

    function startAnimation() {
        const btn = document.getElementById('btn-container');
        btn.style.opacity = '0';
        setTimeout(() => {
            btn.style.display = 'none';
            // بدء نمو الشجرة
            let trunkLength = Math.min(canvas.height * 0.22, 180);
            branches.push(new Branch(canvas.width / 2, canvas.height, -Math.PI / 2, trunkLength, 10, 16));
            requestAnimationFrame(render);
        }, 500);
    }

    class Branch {
        constructor(x, y, angle, length, depth, width) {
            this.x = x;
            this.y = y;
            this.angle = angle;
            this.length = length;
            this.depth = depth;
            this.width = width;
            this.currentLength = 0;
            this.speed = length / 12; 
            this.done = false;
            
            this.endX = this.x + Math.cos(this.angle) * this.length;
            this.endY = this.y + Math.sin(this.angle) * this.length;
        }
        
        update() {
            if (this.done) return;
            
            let prevLength = this.currentLength;
            this.currentLength += this.speed;
            
            if (this.currentLength >= this.length) {
                this.currentLength = this.length;
                this.done = true;
                
                // تفرع الشجرة
                if (this.depth > 0) {
                    let branchesCount = (Math.random() > 0.4 || this.depth > 8) ? 2 : 3;
                    for (let i = 0; i < branchesCount; i++) {
                        let newAngle = this.angle + (Math.random() * 0.7 - 0.35);
                        let newLength = this.length * (0.75 + Math.random() * 0.1);
                        let newWidth = this.width * 0.7;
                        branches.push(new Branch(this.endX, this.endY, newAngle, newLength, this.depth - 1, newWidth));
                    }
                }
            }
            
            let curX = this.x + Math.cos(this.angle) * prevLength;
            let curY = this.y + Math.sin(this.angle) * prevLength;
            let nextX = this.x + Math.cos(this.angle) * this.currentLength;
            let nextY = this.y + Math.sin(this.angle) * this.currentLength;

            ctx.beginPath();
            ctx.moveTo(curX, curY);
            ctx.lineTo(nextX, nextY);
            ctx.lineWidth = this.width;
            ctx.strokeStyle = '#ffb3c6';
            ctx.lineCap = 'round';
            ctx.stroke();
        }
    }

    class Leaf {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 2.5 + 2; 
            this.color = leafColors[Math.floor(Math.random() * leafColors.length)];
            this.scale = 0;
            this.maxScale = 1;
            this.delay = Math.floor(Math.random() * 80); 
            this.done = false;
        }
        
        update() {
            if (this.done) return;
            if (this.delay > 0) {
                this.delay--;
                return;
            }
            
            this.scale += 0.08;
            if (this.scale >= this.maxScale) {
                this.scale = this.maxScale;
                this.done = true;
            }
            
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.scale, this.scale);
            ctx.fillStyle = this.color;
            
            // رسم قلب صغير
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(0, -this.size, -this.size*2, -this.size, -this.size*2, 0);
            ctx.bezierCurveTo(-this.size*2, this.size, 0, this.size*1.5, 0, this.size*2);
            ctx.bezierCurveTo(0, this.size*1.5, this.size*2, this.size, this.size*2, 0);
            ctx.bezierCurveTo(this.size*2, -this.size, 0, -this.size, 0, 0);
            ctx.fill();
            ctx.restore();
        }
    }

    // خوارزمية تشكيل القلب الكبير من الأوراق
    function startBloom() {
        let centerX = canvas.width / 2;
        let centerY = canvas.height * 0.42;
        let heartScale = Math.min(canvas.width, canvas.height) * 0.35; 
        
        let bloomCount = 1800; // كثافة القلوب
        let attempts = 0;
        
        while (leaves.length < bloomCount && attempts < 30000) {
            attempts++;
            let nx = (Math.random() - 0.5) * 3; 
            let ny = (Math.random() - 0.5) * 3;
            // معادلة رسم القلب رياضياً لتوزيع الأوراق داخله
            let val = nx*nx + Math.pow(ny - Math.cbrt(nx*nx), 2);
            
            if (val < 1) {
                let px = centerX + nx * heartScale;
                let py = centerY - ny * heartScale;
                leaves.push(new Leaf(px, py));
            }
        }
    }

    // ظهور النصوص بالترتيب
    function showText() {
        let container = document.getElementById('text-container');
        let delay = 0;
        textLines.forEach((line) => {
            let el = document.createElement('div');
            el.className = 'line';
            el.innerText = line;
            container.appendChild(el);

            setTimeout(() => {
                el.classList.add('visible');
            }, delay);
            delay += 1200; 
        });
    }

    // محرك الأنيميشن الرئيسي
    function render() {
        let growing = false;
        let currentBranches = branches.slice();
        branches = []; 
        
        for (let b of currentBranches) {
            b.update();
            if (!b.done) {
                branches.push(b);
                growing = true;
            }
        }
        
        // عندما تنتهي الشجرة من النمو، تبدأ الأوراق بالظهور
        if (!growing && branches.length === 0 && !treeGrown) {
            treeGrown = true;
            startBloom();
        }
        
        let leavesGrowing = false;
        for (let l of leaves) {
            if (!l.done) {
                l.update();
                leavesGrowing = true;
            }
        }
        
        if (growing || leavesGrowing || branches.length > 0) {
            requestAnimationFrame(render);
        } else if (treeGrown && !textStarted) {
            textStarted = true;
            setTimeout(showText, 500);
        }
    }
</script>
</body>
</html>
